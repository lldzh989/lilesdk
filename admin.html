<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老板接单后台</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; color: #333; }
        .order-list { display: flex; flex-direction: column; gap: 15px; }
        .order-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 5px solid #ff5722; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .order-id { font-weight: bold; }
        .order-time { color: #999; font-size: 0.8rem; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .order-total { text-align: right; font-size: 1.2rem; font-weight: bold; color: #ff5722; margin: 10px 0; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-accept { background-color: #4caf50; }
        .btn-delete { background-color: #f44336; }
        .empty-state { text-align: center; color: #999; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>👨‍🍳 老板接单台</h1>
        <button onclick="loadOrders()">🔄 刷新列表</button>
    </header>

    <div id="order-container" class="order-list"></div>

    <script>
        // 1. 读取订单 (关键修改：使用统一的 Key)
        function loadOrders() {
            const container = document.getElementById('order-container');
            // 读取数据
            const savedOrders = localStorage.getItem('MY_SHOP_ORDERS');
            const orders = savedOrders ? JSON.parse(savedOrders) : [];

            container.innerHTML = '';

            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无订单，休息一下 ☕</div>';
                return;
            }

            // 倒序显示
            orders.reverse().forEach((order, index) => {
                const realIndex = orders.length - 1 - index;
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `<div class="item-row"><span>${item.name}</span><span>¥${item.price}</span></div>`;
                });

                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header">
                        <span class="order-id">订单 #${order.id.toString().slice(-4)}</span>
                        <span class="order-time">${order.time}</span>
                    </div>
                    <div class="order-items">${itemsHtml}</div>
                    <div class="order-total">¥${order.total.toFixed(2)}</div>
                    <div class="btn-group">
                        <button class="btn btn-accept" onclick="acceptOrder(${realIndex})">接单</button>
                        <button class="btn btn-delete" onclick="deleteOrder(${realIndex})">删除</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 2. 接单（删除）
        window.acceptOrder = function(index) {
            const orders = JSON.parse(localStorage.getItem('MY_SHOP_ORDERS') || '[]');
            orders.splice(index, 1);
            localStorage.setItem('MY_SHOP_ORDERS', JSON.stringify(orders));
            loadOrders();
        };

        // 3. 删除
        window.deleteOrder = function(index) {
            if(confirm('确定删除？')) {
                const orders = JSON.parse(localStorage.getItem('MY_SHOP_ORDERS') || '[]');
                orders.splice(index, 1);
                localStorage.setItem('MY_SHOP_ORDERS', JSON.stringify(orders));
                loadOrders();
            }
        };

        // 初始化
        loadOrders();
    </script>
</body>
</html>
