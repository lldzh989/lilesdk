<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点单页面</title>
</head>
<body>
    <h1>欢迎光临</h1>
    <input type="text" id="name" placeholder="你的名字">
    <button onclick="order('咖啡')">点咖啡</button>
    <button onclick="order('奶茶')">点奶茶</button>

    <script>
        // ⚠️ 这里填入你刚才用 cpolar 生成的公网地址
        const SERVER_URL = "http://xxxxx.cpolar.cn/api/order"; 

        function order(item) {
            const name = document.getElementById('name').value;
            if (!name) {
                alert("请输入名字");
                return;
            }

            // 发送数据给手机Python服务器
            fetch(SERVER_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    item: item,
                    name: name
                })
            })
            .then(response => response.json())
            .then(data => {
                alert("点单成功！");
            })
            .catch(error => {
                console.error('Error:', error);
                alert("连接服务器失败，请检查手机服务器是否开启穿透！");
            });
        }
    </script>
</body>
</html>
